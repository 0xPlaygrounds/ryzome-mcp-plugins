name: Publish Package

on:
    push:
        branches:
            - main
    release:
        types:
            - published

permissions:
    contents: read
    id-token: write

jobs:
    verify:
        name: Lint, typecheck and test package
        runs-on: ubuntu-latest
        if: github.event_name == 'push' || (github.event_name == 'release' && !github.event.release.prerelease)
        steps:
            - name: Check out repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.31.0

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org"
                  cache: "pnpm"

            - name: Enable Corepack
              run: corepack enable

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm run lint:check

            - name: Typecheck
              run: pnpm run typecheck

            - name: Test
              run: pnpm test

            - name: Integration test
              run: pnpm run test:integration

    live-smoke:
        name: Live production smoke test
        runs-on: ubuntu-latest
        needs: verify
        if: github.event_name == 'release' && !github.event.release.prerelease
        env:
            RYZOME_ENABLE_LIVE_SMOKE: "1"
            RYZOME_LIVE_SMOKE_API_KEY: ${{ secrets.RYZOME_LIVE_SMOKE_API_KEY }}
            RYZOME_LIVE_SMOKE_API_URL: ${{ vars.RYZOME_LIVE_SMOKE_API_URL }}
            RYZOME_LIVE_SMOKE_APP_URL: ${{ vars.RYZOME_LIVE_SMOKE_APP_URL }}
        steps:
            - name: Check out repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.31.0

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org"
                  cache: "pnpm"

            - name: Enable Corepack
              run: corepack enable

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate live smoke configuration
              run: |
                  test -n "$RYZOME_LIVE_SMOKE_API_KEY" || {
                    echo "RYZOME_LIVE_SMOKE_API_KEY is required for stable publishes."
                    exit 1
                  }

            - name: Run live smoke integration test
              run: pnpm run test:integration

    publish-dev:
        name: Publish dev build to npm
        runs-on: ubuntu-latest
        needs: 
            - verify
            - live-smoke
        if: github.event_name == 'push'
        steps:
            - name: Check out repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.sha }}

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.31.0

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org"
                  cache: "pnpm"

            - name: Enable Corepack
              run: corepack enable

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Prepare prerelease version
              run: >
                  node scripts/prepare-publish-version.mjs
                  --mode dev
                  --run-number "${{ github.run_number }}"
                  --run-attempt "${{ github.run_attempt }}"

            - name: Debug git state
              run: |
                  git status --short
                  git diff -- package.json openclaw.plugin.json pnpm-lock.yaml

            - name: Publish prerelease to npm
              run: pnpm publish --tag dev --no-git-checks

    publish-stable:
        name: Publish stable release to npm
        runs-on: ubuntu-latest
        needs:
            - verify
            - live-smoke
        if: github.event_name == 'release' && !github.event.release.prerelease
        steps:
            - name: Check out repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.release.tag_name }}

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.31.0

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org"
                  cache: "pnpm"

            - name: Enable Corepack
              run: corepack enable

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Prepare stable version
              run: >
                  node scripts/prepare-publish-version.mjs
                  --mode stable
                  --tag "${{ github.event.release.tag_name }}"

            - name: Publish stable release to npm
              run: pnpm publish --no-git-checks
