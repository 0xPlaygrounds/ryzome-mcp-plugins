name: Live Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-smoke:
    name: Live production smoke test
    runs-on: ubuntu-latest
    if: ${{ secrets.RYZOME_LIVE_SMOKE_API_KEY != '' }}
    env:
      RYZOME_ENABLE_LIVE_SMOKE: "1"
      RYZOME_LIVE_SMOKE_API_KEY: ${{ secrets.RYZOME_LIVE_SMOKE_API_KEY }}
      RYZOME_LIVE_SMOKE_API_URL: ${{ vars.RYZOME_LIVE_SMOKE_API_URL }}
      RYZOME_LIVE_SMOKE_APP_URL: ${{ vars.RYZOME_LIVE_SMOKE_APP_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run live smoke integration test
        run: pnpm run test:integration
